<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Tools AI Notes">
<meta name="theme-color" content="#111111">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="/icon-256.png">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<title>Tools AI Notes</title>
<style>
/* ═══ EXACT DESKTOP APP COLORS ═══ */
:root{
  --bg:#111111;--bg-editor:#0e0e0e;--bg-card:#1a1a1a;--bg-input:#1a1a1a;
  --border:#2a2a2a;--border-light:#1e1e1e;
  --text:#e5e5e5;--text2:#999999;--text3:#888888;--text4:#666666;--text5:#555555;
  --accent:#6366f1;--blue:#3b82f6;--blue-active:rgba(59,130,246,.85);
  --red:#ef4444;--green:#22c55e;
  --font:-apple-system,BlinkMacSystemFont,'SF Pro Text',system-ui,sans-serif;
  --sat:env(safe-area-inset-top,0px);--sab:env(safe-area-inset-bottom,0px);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font);overflow:hidden;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:#333;border-radius:2px}

/* ═══ LIST VIEW — Apple Notes layout, desktop app colors ═══ */
#list-view{display:flex;flex-direction:column;height:100%;padding-top:var(--sat)}
#list-title{font-size:34px;font-weight:700;letter-spacing:.37px;padding:8px 16px 0;color:var(--text)}
#list-count{font-size:13px;color:var(--text3);padding:0 16px 8px}
#search-wrap{padding:0 16px 10px}
#search{width:100%;padding:8px 12px 8px 32px;border:none;border-radius:8px;background:var(--bg-input);color:var(--text);font-size:14px;font-family:var(--font);outline:none;
  background-image:url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="%23666" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.35-4.35"/></svg>');
  background-repeat:no-repeat;background-position:10px center}
#search::placeholder{color:var(--text4)}
#note-list{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:0 16px}

/* Date groups — Apple Notes style */
.dg{margin-bottom:14px}
.dl{font-size:20px;font-weight:700;padding:8px 0 6px;color:var(--text)}
.cg{background:var(--bg-card);border-radius:10px;overflow:hidden}
.nr{padding:10px 14px;cursor:pointer;position:relative;transition:background .1s}
.nr:not(:last-child)::after{content:'';position:absolute;bottom:0;left:14px;right:0;height:.5px;background:var(--border)}
.nr.active{background:var(--blue-active);border-radius:8px}
.nr.active::after{display:none}
.nr.active .nt{color:#fff}
.nr.active .nm span:first-child{color:rgba(255,255,255,.85)}
.nr.active .nm span:last-child{color:rgba(255,255,255,.55)}
.nt{font-size:14px;font-weight:600;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-bottom:2px;letter-spacing:-.1px}
.nm{font-size:12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.nm span:first-child{color:var(--text2)}
.nm span:last-child{color:var(--text3)}

/* Empty state */
.empty{text-align:center;padding:60px 20px;color:var(--text4)}

/* Footer */
#list-footer{padding:10px 16px;flex-shrink:0;display:flex;align-items:center;justify-content:center;border-top:.5px solid var(--border-light);padding-bottom:calc(10px + var(--sab));position:relative}
.fc{font-size:11px;color:var(--text5)}
#new-btn{position:absolute;right:16px;background:none;border:none;color:var(--accent);cursor:pointer;padding:8px;display:flex}

/* ═══ EDITOR VIEW — desktop app colors ═══ */
#ed-view{display:none;flex-direction:column;height:100%;padding-top:var(--sat);background:var(--bg-editor)}
#ed-head{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;flex-shrink:0;border-bottom:1px solid var(--border-light);background:var(--bg)}
#back-btn{background:none;border:none;color:var(--blue);cursor:pointer;padding:6px;display:flex;align-items:center;gap:4px;font-size:14px;font-weight:500;font-family:var(--font)}
.ea{display:flex;gap:2px;align-items:center}
.ea button{background:none;border:none;color:var(--text2);cursor:pointer;width:32px;height:32px;border-radius:6px;display:flex;align-items:center;justify-content:center}
.ea button:active{background:var(--bg-card)}
#done-btn{color:var(--accent)!important;font-weight:600}
#ed-date{text-align:center;font-size:11px;color:var(--text3);padding:12px 0 4px}

/* Editor — EXACT from desktop app */
#editor{flex:1;outline:none;font-size:15px;line-height:1.7;padding:4px 24px 60px;overflow-y:auto;-webkit-overflow-scrolling:touch;word-break:break-word;caret-color:var(--accent);font-family:var(--font)}
#editor>div:first-child{font-size:26px!important;font-weight:700!important;line-height:1.3!important;color:var(--text)!important;letter-spacing:-.3px}
#editor>div:not(:first-child){font-size:15px!important;font-weight:400!important;line-height:1.7!important;color:#ccc!important}

/* Format bar — EXACT desktop toolbar style */
#fmt{display:flex;align-items:center;gap:1px;padding:8px 16px;border-top:1px solid var(--border-light);background:var(--bg);flex-shrink:0;padding-bottom:calc(8px + var(--sab))}
.fb{background:none;border:none;color:var(--text2);cursor:pointer;padding:4px 8px;border-radius:4px;font-family:var(--font);font-size:14px;display:flex;align-items:center;justify-content:center;min-width:28px;height:30px}
.fb:active{background:var(--bg-card)}
.fmt-sep{width:1px;height:16px;background:var(--border);margin:0 6px}
</style>
</head>
<body>

<!-- LIST VIEW -->
<div id="list-view">
  <div id="list-title">Notes</div>
  <div id="list-count"></div>
  <div id="search-wrap"><input id="search" type="text" placeholder="Search"/></div>
  <div id="note-list"></div>
  <div id="list-footer">
    <span class="fc" id="nc"></span>
    <button id="new-btn" title="New Note"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg></button>
  </div>
</div>

<!-- EDITOR VIEW -->
<div id="ed-view">
  <div id="ed-head">
    <button id="back-btn"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg> Notes</button>
    <div class="ea">
      <button id="pin-btn" title="Pin"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 17v5"/><path d="M9 2h6l-1 7h4l-7 8 1-5H8z"/></svg></button>
      <button id="del-btn" title="Delete"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg></button>
      <button id="done-btn" title="Done">Done</button>
    </div>
  </div>
  <div id="ed-date"></div>
  <div id="editor" contenteditable="true" spellcheck="true"></div>
  <div id="fmt">
    <button class="fb" data-cmd="bold" style="font-weight:800">B</button>
    <button class="fb" data-cmd="italic" style="font-style:italic">I</button>
    <button class="fb" data-cmd="underline" style="text-decoration:underline">U</button>
    <button class="fb" data-cmd="strikethrough" style="text-decoration:line-through">S</button>
    <div class="fmt-sep"></div>
    <button class="fb" data-cmd="insertUnorderedList"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="9" y1="6" x2="21" y2="6"/><line x1="9" y1="12" x2="21" y2="12"/><line x1="9" y1="18" x2="21" y2="18"/><circle cx="4" cy="6" r="1.5" fill="currentColor" stroke="none"/><circle cx="4" cy="12" r="1.5" fill="currentColor" stroke="none"/><circle cx="4" cy="18" r="1.5" fill="currentColor" stroke="none"/></svg></button>
    <button class="fb" data-cmd="insertOrderedList"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="10" y1="6" x2="21" y2="6"/><line x1="10" y1="12" x2="21" y2="12"/><line x1="10" y1="18" x2="21" y2="18"/></svg></button>
  </div>
</div>

<script>
var SB_URL='https://synpjcammfjebwsmtfpz.supabase.co';
var SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InN5bnBqY2FtbWZqZWJ3c210ZnB6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njk0OTU3NDcsImV4cCI6MjA4NTA3MTc0N30.iHXwtPV10JGPL5OKgkpd6WxerTQoI4YE4-ld9g38eRQ';
var UP=new URLSearchParams(location.search);
var UID=UP.get('uid')||localStorage.getItem('toolsai_notes_uid')||'';
if(UID)localStorage.setItem('toolsai_notes_uid',UID);
var _aid=null;

function getNotes(){try{return JSON.parse(localStorage.getItem('toolsai_notes_'+UID)||'[]')}catch(e){return[]}}
function saveNotes(n){n.sort(function(a,b){return(b.updatedAt||b.createdAt||0)-(a.updatedAt||a.createdAt||0)});try{localStorage.setItem('toolsai_notes_'+UID,JSON.stringify(n))}catch(e){};syncCloud(n)}
function addNote(t){var ns=getNotes();var n={id:'note_'+Date.now(),body:t||'',source:'mobile',createdAt:Date.now(),updatedAt:Date.now(),pinned:false};ns.unshift(n);saveNotes(ns);return n}
function getTitle(n){return(n.body||n.text||'').split('\n')[0].trim()||'New Note'}
function getPreview(n){return((n.body||n.text||'').split('\n')[1]||'').trim().slice(0,80)||'No additional text'}
function esc(s){if(!s)return'';var d=document.createElement('div');d.textContent=s;return d.innerHTML}
function fmtTime(ts){var d=new Date(ts),now=new Date(),td=new Date(now.getFullYear(),now.getMonth(),now.getDate()).getTime();if(ts>=td)return d.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});if(ts>=td-86400000)return'Yesterday';return d.toLocaleDateString('en-US',{month:'short',day:'numeric'})}
function groupNotes(ns){var now=new Date(),td=new Date(now.getFullYear(),now.getMonth(),now.getDate()).getTime(),yd=td-86400000,wk=td-6*86400000,mo=td-29*86400000;
  var g={pinned:[],today:[],yesterday:[],week:[],month:[],older:[]};
  ns.forEach(function(n){if(n.pinned){g.pinned.push(n);return}var t=n.updatedAt||n.createdAt;if(t>=td)g.today.push(n);else if(t>=yd)g.yesterday.push(n);else if(t>=wk)g.week.push(n);else if(t>=mo)g.month.push(n);else g.older.push(n)});return g}

/* ═══ CLOUD SYNC — silent, no badges ═══ */
var _sT=null;
function syncCloud(ns){if(!SB_URL||!UID)return;clearTimeout(_sT);_sT=setTimeout(function(){
  fetch(SB_URL+'/rest/v1/notes_sync',{method:'POST',headers:{'Content-Type':'application/json','apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Prefer':'resolution=merge-duplicates'},
    body:JSON.stringify({user_id:UID,notes_data:JSON.stringify(ns),updated_at:new Date().toISOString()})}).catch(function(){})},1200)}
function pullCloud(cb){if(!SB_URL||!UID){cb(null);return}
  var done=false;
  var t=setTimeout(function(){if(!done){done=true;cb(null)}},8000);
  fetch(SB_URL+'/rest/v1/notes_sync?user_id=eq.'+encodeURIComponent(UID)+'&select=notes_data,updated_at&limit=1',{
    headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY}}).then(function(r){return r.json()}).then(function(rows){
    if(done)return;done=true;clearTimeout(t);
    if(rows&&rows.length>0&&rows[0].notes_data){try{cb(JSON.parse(rows[0].notes_data))}catch(e){cb(null)}}else cb(null)}).catch(function(){if(!done){done=true;clearTimeout(t);cb(null)}})}
function mergeNotes(a,b){if(!b||!b.length)return a;if(!a||!a.length)return b;
  var m={};b.forEach(function(n){m[n.id]=n});a.forEach(function(n){if(!m[n.id])m[n.id]=n;else{if((n.updatedAt||0)>(m[n.id].updatedAt||0))m[n.id]=n}});
  var r=Object.values(m);r.sort(function(a,b){return(b.updatedAt||b.createdAt||0)-(a.updatedAt||a.createdAt||0)});return r}

/* ═══ LIST ═══ */
function renderList(){
  var ns=getNotes(),list=document.getElementById('note-list');
  var c=ns.length;
  document.getElementById('list-count').textContent=c+' Note'+(c!==1?'s':'');
  document.getElementById('nc').textContent=c+' note'+(c!==1?'s':'');
  if(!c){list.innerHTML='<div class="empty"><svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="#444" stroke-width="1" style="margin-bottom:10px"><path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"/><polyline points="13 2 13 9 20 9"/></svg><div style="font-size:16px;font-weight:600;color:#888;margin-bottom:4px">No Notes</div><div style="font-size:13px">Tap + to create one</div></div>';return}
  var g=groupNotes(ns);
  var secs=[{l:'Pinned',i:g.pinned},{l:'Today',i:g.today},{l:'Yesterday',i:g.yesterday},{l:'Previous 7 Days',i:g.week},{l:'Previous 30 Days',i:g.month},{l:'Older',i:g.older}];
  var h='';secs.forEach(function(s){if(!s.i.length)return;
    h+='<div class="dg"><div class="dl">'+s.l+'</div><div class="cg">';
    s.i.forEach(function(n){var title=esc(getTitle(n)),time=fmtTime(n.updatedAt||n.createdAt),prev=esc(getPreview(n));
      h+='<div class="nr" data-id="'+n.id+'"><div class="nt">'+(n.pinned?'<svg width="9" height="9" viewBox="0 0 24 24" fill="#6366f1" stroke="none" style="margin-right:4px;vertical-align:1px"><path d="M9 2h6l-1 7h4l-7 8 1-5H8z"/></svg>':'')+title+'</div><div class="nm"><span>'+time+'</span>  <span>'+prev+'</span></div></div>'});
    h+='</div></div>'});
  list.innerHTML=h;
  document.querySelectorAll('.nr').forEach(function(r){r.addEventListener('click',function(){_aid=this.dataset.id;openEditor()})});
}

/* ═══ EDITOR ═══ */
function openEditor(){
  var note=getNotes().find(function(n){return n.id===_aid});if(!note)return;
  document.getElementById('list-view').style.display='none';
  document.getElementById('ed-view').style.display='flex';
  // Update pin button color
  var pb=document.getElementById('pin-btn');
  pb.style.color=note.pinned?'#6366f1':'';
  pb.querySelector('svg').setAttribute('fill',note.pinned?'currentColor':'none');
  // Date
  var d=new Date(note.updatedAt||note.createdAt);
  document.getElementById('ed-date').textContent=d.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'})+' at '+d.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});
  // Content
  var ed=document.getElementById('editor');ed.dataset.noteId=note.id;
  var body=note.body||note.text||'',lines=body.split('\n'),h='';
  if(lines[0]||lines.length<=1)h+='<div>'+(esc(lines[0])||'<br>')+'</div>';
  for(var i=1;i<lines.length;i++)h+='<div>'+(esc(lines[i])||'<br>')+'</div>';
  if(lines.length<=1&&lines[0])h+='<div><br></div>';
  if(!h)h='<div><br></div><div><br></div>';
  ed.innerHTML=h;ed.focus();
  try{var sel=window.getSelection(),fd=ed.firstElementChild;if(fd){var rng=document.createRange();if(!lines[0])rng.setStart(fd,0);else{rng.selectNodeContents(fd);rng.collapse(false)}sel.removeAllRanges();sel.addRange(rng)}}catch(e){}
}
function closeEditor(){saveContent();document.getElementById('ed-view').style.display='none';document.getElementById('list-view').style.display='flex';renderList()}
function saveContent(){var ed=document.getElementById('editor'),nid=ed.dataset.noteId;if(!nid)return;
  var all=getNotes(),n=all.find(function(x){return x.id===nid});if(!n)return;
  var ch=ed.children,lines=[];for(var i=0;i<ch.length;i++)lines.push(ch[i].innerText||'');
  if(!lines.length)lines=[ed.innerText||''];
  var newBody=lines.join('\n');
  // Only bump updatedAt if content actually changed — otherwise phone wins merge over desktop edits
  if(newBody!==n.body){n.body=newBody;n.updatedAt=Date.now();
    if(!n.body.trim()){all=all.filter(function(x){return x.id!==n.id});if(_aid===n.id)_aid=null}
    saveNotes(all)}}

/* ═══ EVENTS ═══ */
document.getElementById('back-btn').addEventListener('click',closeEditor);
document.getElementById('done-btn').addEventListener('click',closeEditor);
document.getElementById('new-btn').addEventListener('click',function(){var n=addNote('');_aid=n.id;openEditor()});
document.getElementById('pin-btn').addEventListener('click',function(){
  saveContent();var all=getNotes(),n=all.find(function(x){return x.id===_aid});
  if(n){n.pinned=!n.pinned;saveNotes(all);var pb=document.getElementById('pin-btn');pb.style.color=n.pinned?'#6366f1':'';pb.querySelector('svg').setAttribute('fill',n.pinned?'currentColor':'none')}});
document.getElementById('del-btn').addEventListener('click',function(){
  if(!confirm('Delete this note?'))return;var all=getNotes().filter(function(x){return x.id!==_aid});saveNotes(all);_aid=null;closeEditor()});
document.querySelectorAll('.fb[data-cmd]').forEach(function(b){b.addEventListener('mousedown',function(e){e.preventDefault()});b.addEventListener('click',function(){document.execCommand(b.dataset.cmd,false,null);document.getElementById('editor').focus()})});
var _svT=null;document.getElementById('editor').addEventListener('input',function(){clearTimeout(_svT);_svT=setTimeout(saveContent,500)});
document.getElementById('editor').addEventListener('keydown',function(e){if(e.key==='Enter'){var sel=window.getSelection(),fd=this.firstElementChild;if(fd&&sel.anchorNode&&(fd.contains(sel.anchorNode)||fd===sel.anchorNode)){e.preventDefault();var nd=document.createElement('div');nd.innerHTML='<br>';fd.after(nd);var r=document.createRange();r.setStart(nd,0);r.collapse(true);sel.removeAllRanges();sel.addRange(r)}}});
document.getElementById('search').addEventListener('input',function(){var q=this.value.toLowerCase().trim(),all=getNotes();
  document.querySelectorAll('.nr').forEach(function(r){var n=all.find(function(x){return x.id===r.dataset.id});r.style.display=(!q||((n?n.body:'')+getTitle(n||{})).toLowerCase().indexOf(q)>=0)?'':'none'});
  document.querySelectorAll('.dg').forEach(function(g){var v=false;g.querySelectorAll('.nr').forEach(function(r){if(r.style.display!=='none')v=true});g.style.display=v?'':'none'})});

/* ═══ STARTUP ═══ */
if(!UID){
  document.getElementById('note-list').innerHTML='<div style="text-align:center;padding:80px 20px"><svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="#444" stroke-width="1" style="margin-bottom:16px"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg><div style="font-size:18px;font-weight:600;margin-bottom:8px">Connect to Tools AI</div><div style="font-size:14px;color:#888;max-width:280px;margin:0 auto;line-height:1.5">Open Tools AI on your desktop, go to Notes, and tap the phone icon to scan your QR code.</div></div>';
  document.getElementById('new-btn').style.display='none';
} else {
  pullCloud(function(cn){var l=getNotes();if(cn){var m=mergeNotes(l,cn);localStorage.setItem('toolsai_notes_'+UID,JSON.stringify(m))}renderList()});
  setInterval(function(){if(document.getElementById('ed-view').style.display==='flex')return;
    pullCloud(function(cn){if(cn){var l=getNotes();var m=mergeNotes(l,cn);localStorage.setItem('toolsai_notes_'+UID,JSON.stringify(m));renderList()}})},5000);
}
</script>
</body>
</html>
