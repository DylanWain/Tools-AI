<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Tools AI Notes">
<meta name="theme-color" content="#000000">
<link rel="manifest" href="data:application/json;base64,eyJuYW1lIjoiVG9vbHMgQUkgTm90ZXMiLCJzaG9ydF9uYW1lIjoiTm90ZXMiLCJzdGFydF91cmwiOiIuL25vdGVzIiwiZGlzcGxheSI6InN0YW5kYWxvbmUiLCJiYWNrZ3JvdW5kX2NvbG9yIjoiIzAwMDAwMCIsInRoZW1lX2NvbG9yIjoiIzAwMDAwMCJ9">
<title>Tools AI Notes</title>
<style>
:root{--bg:#000;--bg-card:#1c1c1e;--border:#2c2c2e;--text:#fff;--text2:#8e8e93;--text3:#636366;--accent:#d4a232;--blue:#0a84ff;--red:#ff453a;--green:#30d158;--font:-apple-system,BlinkMacSystemFont,'SF Pro Text',system-ui,sans-serif;--sat:env(safe-area-inset-top,0px);--sab:env(safe-area-inset-bottom,0px)}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font);overflow:hidden;-webkit-font-smoothing:antialiased}

#list-view{display:flex;flex-direction:column;height:100%;padding-top:var(--sat)}
#list-title{font-size:34px;font-weight:700;letter-spacing:.37px;padding:8px 16px 2px}
#search-wrap{padding:4px 16px 10px}
#search{width:100%;padding:8px 12px 8px 32px;border:none;border-radius:10px;background:var(--bg-card);color:var(--text);font-size:15px;font-family:var(--font);outline:none;background-image:url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="%238e8e93" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.35-4.35"/></svg>');background-repeat:no-repeat;background-position:10px center}
#search::placeholder{color:var(--text3)}
#note-list{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:0 16px}
.date-group{margin-bottom:16px}
.date-label{font-size:22px;font-weight:700;padding:8px 0 6px}
.note-card-group{background:var(--bg-card);border-radius:12px;overflow:hidden}
.note-row{padding:12px 16px;cursor:pointer;position:relative}
.note-row:not(:last-child)::after{content:'';position:absolute;bottom:0;left:16px;right:0;height:.5px;background:var(--border)}
.note-row.active{background:#2c2c2e}
.note-title{font-size:16px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-bottom:2px}
.note-meta{font-size:14px;color:var(--text2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.note-meta span:last-child{color:var(--text3)}
.empty-state{text-align:center;padding:60px 20px;color:var(--text3)}
#list-footer{padding:12px 16px;flex-shrink:0;display:flex;align-items:center;justify-content:center;border-top:.5px solid var(--border);padding-bottom:calc(12px + var(--sab));position:relative}
.footer-count{font-size:12px;color:var(--text3)}
#new-note-btn{position:absolute;right:16px;background:none;border:none;color:var(--accent);cursor:pointer;padding:8px;display:flex}

#editor-view{display:none;flex-direction:column;height:100%;padding-top:var(--sat)}
#editor-header{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;flex-shrink:0}
#back-btn{background:rgba(255,255,255,.1);border:none;color:var(--text);cursor:pointer;width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center}
.ea{display:flex;gap:4px;align-items:center}
.ea button{background:rgba(255,255,255,.1);border:none;color:var(--text2);cursor:pointer;width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center}
#done-btn{background:var(--accent)!important;color:#000!important}
#done-btn svg{stroke:#000}
#editor-date{text-align:center;font-size:13px;color:var(--text3);padding:12px 0 4px}
#editor{flex:1;outline:none;font-size:17px;line-height:1.65;padding:4px 20px 60px;overflow-y:auto;-webkit-overflow-scrolling:touch;word-break:break-word;caret-color:var(--accent)}
#editor>div:first-child{font-size:28px!important;font-weight:700!important;line-height:1.25!important;color:var(--text)!important;letter-spacing:-.3px}
#editor>div:not(:first-child){font-size:17px!important;font-weight:400!important;line-height:1.65!important;color:var(--text2)!important}
#fmt-bar{display:flex;align-items:center;justify-content:space-around;padding:8px 12px;border-top:.5px solid var(--border);background:var(--bg-card);flex-shrink:0;padding-bottom:calc(8px + var(--sab))}
.fb{background:none;border:none;color:var(--text2);cursor:pointer;padding:8px 12px;border-radius:8px;font-family:var(--font);font-size:15px;display:flex;align-items:center;justify-content:center;min-width:36px}
.fb:active{background:rgba(255,255,255,.1)}

#sync-status{position:fixed;top:var(--sat);right:8px;padding:4px 10px;font-size:10px;font-weight:600;border-radius:0 0 8px 8px;z-index:50;transition:all .3s;opacity:0;font-family:var(--font)}
.syncing{background:var(--blue);color:#fff;opacity:1!important}
.synced{background:var(--green);color:#fff;opacity:1!important}
.sync-err{background:var(--red);color:#fff;opacity:1!important}
</style>
</head>
<body>
<div id="sync-status"></div>
<div id="list-view">
  <div id="list-title">Notes</div>
  <div id="search-wrap"><input id="search" type="text" placeholder="Search"/></div>
  <div id="note-list"></div>
  <div id="list-footer"><span class="footer-count" id="note-count"></span><button id="new-note-btn" title="New Note"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg></button></div>
</div>
<div id="editor-view">
  <div id="editor-header">
    <button id="back-btn"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg></button>
    <div class="ea">
      <button id="undo-btn"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 7v6h6"/><path d="M21 17a9 9 0 0 0-9-9 9 9 0 0 0-6.69 3L3 13"/></svg></button>
      <button id="share-btn"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg></button>
      <button id="more-btn"><svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="5" r="1.5"/><circle cx="12" cy="12" r="1.5"/><circle cx="12" cy="19" r="1.5"/></svg></button>
      <button id="done-btn"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg></button>
    </div>
  </div>
  <div id="editor-date"></div>
  <div id="editor" contenteditable="true" spellcheck="true"></div>
  <div id="fmt-bar">
    <button class="fb" style="font-weight:400;font-size:17px">Aa</button>
    <button class="fb" data-cmd="insertUnorderedList"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="9" y1="6" x2="20" y2="6"/><line x1="9" y1="12" x2="20" y2="12"/><line x1="9" y1="18" x2="20" y2="18"/><circle cx="4" cy="6" r="1.5" fill="currentColor" stroke="none"/><circle cx="4" cy="12" r="1.5" fill="currentColor" stroke="none"/><circle cx="4" cy="18" r="1.5" fill="currentColor" stroke="none"/></svg></button>
    <button class="fb" data-cmd="bold"><strong>B</strong></button>
    <button class="fb" data-cmd="italic"><em>I</em></button>
    <button class="fb" data-cmd="underline" style="text-decoration:underline">U</button>
    <button class="fb" data-cmd="strikethrough" style="text-decoration:line-through">S</button>
  </div>
</div>
<script>
var SB_URL='https://synpjcammfjebwsmtfpz.supabase.co';
var SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InN5bnBqY2FtbWZqZWJ3c210ZnB6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njk0OTU3NDcsImV4cCI6MjA4NTA3MTc0N30.iHXwtPV10JGPL5OKgkpd6WxerTQoI4YE4-ld9g38eRQ';
var urlParams=new URLSearchParams(location.search);
var USER_ID=urlParams.get('uid')||localStorage.getItem('toolsai_notes_uid')||'';
if(USER_ID)localStorage.setItem('toolsai_notes_uid',USER_ID);
var _activeNoteId=null;

function getNotes(){try{return JSON.parse(localStorage.getItem('toolsai_notes_'+USER_ID)||'[]')}catch(e){return[]}}
function saveNotes(notes){try{localStorage.setItem('toolsai_notes_'+USER_ID,JSON.stringify(notes))}catch(e){};syncToCloud(notes)}
function addNote(t){var notes=getNotes();var n={id:'note_'+Date.now(),body:t||'',source:'mobile',createdAt:Date.now(),updatedAt:Date.now(),pinned:false};notes.unshift(n);saveNotes(notes);return n}
function getNoteTitle(n){var b=n.body||n.text||'';return b.split('\n')[0].trim()||'New Note'}
function getNotePreview(n){var b=n.body||n.text||'';var l=b.split('\n');return(l[1]||'').trim().slice(0,80)||'No additional text'}
function esc(s){if(!s)return'';var d=document.createElement('div');d.textContent=s;return d.innerHTML}
function formatTime(ts){var d=new Date(ts);var now=new Date();var today=new Date(now.getFullYear(),now.getMonth(),now.getDate()).getTime();if(ts>=today)return d.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});if(ts>=today-86400000)return'Yesterday';return d.toLocaleDateString('en-US',{month:'short',day:'numeric'})}
function groupNotes(notes){var now=new Date();var today=new Date(now.getFullYear(),now.getMonth(),now.getDate()).getTime();var yd=today-86400000;var wk=today-6*86400000;var g={pinned:[],today:[],yesterday:[],week:[],older:[]};notes.forEach(function(n){if(n.pinned){g.pinned.push(n);return}var t=n.updatedAt||n.createdAt;if(t>=today)g.today.push(n);else if(t>=yd)g.yesterday.push(n);else if(t>=wk)g.week.push(n);else g.older.push(n)});return g}

var _syncTimer=null;
function syncToCloud(notes){if(!SB_URL||!USER_ID)return;clearTimeout(_syncTimer);_syncTimer=setTimeout(function(){showSync('syncing','Syncing…');fetch(SB_URL+'/rest/v1/notes_sync',{method:'POST',headers:{'Content-Type':'application/json','apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Prefer':'resolution=merge-duplicates'},body:JSON.stringify({user_id:USER_ID,notes_data:JSON.stringify(notes),updated_at:new Date().toISOString()})}).then(function(r){if(r.ok)showSync('synced','Synced');else showSync('sync-err','Failed')}).catch(function(){showSync('sync-err','Offline')})},1200)}
function pullFromCloud(cb){if(!SB_URL||!USER_ID){cb(null);return}showSync('syncing','Loading…');fetch(SB_URL+'/rest/v1/notes_sync?user_id=eq.'+encodeURIComponent(USER_ID)+'&select=notes_data,updated_at&limit=1',{headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY}}).then(function(r){return r.json()}).then(function(rows){if(rows&&rows.length>0&&rows[0].notes_data){try{showSync('synced','Loaded');cb(JSON.parse(rows[0].notes_data))}catch(e){cb(null)}}else{showSync('synced','Ready');cb(null)}}).catch(function(){showSync('sync-err','Offline');cb(null)})}
function mergeNotes(a,b){if(!b||!b.length)return a;if(!a||!a.length)return b;var m={};b.forEach(function(n){m[n.id]=n});a.forEach(function(n){if(!m[n.id])m[n.id]=n;else{if((n.updatedAt||0)>(m[n.id].updatedAt||0))m[n.id]=n}});var r=Object.values(m);r.sort(function(a,b){return(b.updatedAt||b.createdAt||0)-(a.updatedAt||a.createdAt||0)});return r}
function showSync(c,t){var s=document.getElementById('sync-status');s.className=c;s.textContent=t;if(c==='synced')setTimeout(function(){s.style.opacity='0'},2000)}

function renderList(){
  var notes=getNotes();var list=document.getElementById('note-list');
  document.getElementById('note-count').textContent=notes.length+' Note'+(notes.length!==1?'s':'');
  if(!notes.length){list.innerHTML='<div class="empty-state"><svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" style="opacity:.25;margin-bottom:12px"><path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"/><polyline points="13 2 13 9 20 9"/></svg><div style="font-size:17px;font-weight:600;color:#8e8e93;margin-bottom:4px">No Notes</div><div style="font-size:14px">Tap + to create one</div></div>';return}
  var g=groupNotes(notes);var secs=[{l:'Pinned',i:g.pinned},{l:'Today',i:g.today},{l:'Yesterday',i:g.yesterday},{l:'Previous 7 Days',i:g.week},{l:'Older',i:g.older}];
  var h='';secs.forEach(function(s){if(!s.i.length)return;h+='<div class="date-group"><div class="date-label">'+s.l+'</div><div class="note-card-group">';
    s.i.forEach(function(n){var title=esc(getNoteTitle(n));var time=formatTime(n.updatedAt||n.createdAt);var prev=esc(getNotePreview(n));
      h+='<div class="note-row" data-id="'+n.id+'"><div class="note-title">'+(n.pinned?'<span style="color:#d4a232;font-size:12px;margin-right:4px">📌</span>':'')+title+'</div><div class="note-meta"><span>'+time+'</span>  <span>'+prev+'</span></div></div>'});
    h+='</div></div>'});
  list.innerHTML=h;
  document.querySelectorAll('.note-row').forEach(function(r){r.addEventListener('click',function(){_activeNoteId=this.dataset.id;openEditor()})});
}

function openEditor(){
  var note=getNotes().find(function(n){return n.id===_activeNoteId});if(!note)return;
  document.getElementById('list-view').style.display='none';document.getElementById('editor-view').style.display='flex';
  var d=new Date(note.updatedAt||note.createdAt);
  document.getElementById('editor-date').textContent=d.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'})+' at '+d.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});
  var ed=document.getElementById('editor');ed.dataset.noteId=note.id;
  var body=note.body||note.text||'';var lines=body.split('\n');var h='';
  if(lines[0]||lines.length<=1)h+='<div>'+(esc(lines[0])||'<br>')+'</div>';
  for(var i=1;i<lines.length;i++)h+='<div>'+(esc(lines[i])||'<br>')+'</div>';
  if(lines.length<=1&&lines[0])h+='<div><br></div>';
  if(!h)h='<div><br></div><div><br></div>';
  ed.innerHTML=h;ed.focus();
  try{var sel=window.getSelection();var fd=ed.firstElementChild;if(fd){var rng=document.createRange();if(!lines[0])rng.setStart(fd,0);else{rng.selectNodeContents(fd);rng.collapse(false)}sel.removeAllRanges();sel.addRange(rng)}}catch(e){}
}
function closeEditor(){saveEditorContent();document.getElementById('editor-view').style.display='none';document.getElementById('list-view').style.display='flex';renderList()}
function saveEditorContent(){var ed=document.getElementById('editor');var nid=ed.dataset.noteId;if(!nid)return;var all=getNotes();var n=all.find(function(x){return x.id===nid});if(!n)return;var ch=ed.children,lines=[];for(var i=0;i<ch.length;i++)lines.push(ch[i].innerText||'');if(!lines.length)lines=[ed.innerText||''];n.body=lines.join('\n');n.updatedAt=Date.now();if(!n.body.trim()){all=all.filter(function(x){return x.id!==n.id});if(_activeNoteId===n.id)_activeNoteId=null}saveNotes(all)}

document.getElementById('back-btn').addEventListener('click',closeEditor);
document.getElementById('done-btn').addEventListener('click',closeEditor);
document.getElementById('undo-btn').addEventListener('click',function(){document.execCommand('undo')});
document.getElementById('share-btn').addEventListener('click',function(){var t=document.getElementById('editor').innerText||'';if(navigator.share)navigator.share({text:t}).catch(function(){});else navigator.clipboard.writeText(t).then(function(){showSync('synced','Copied!')})});
document.getElementById('new-note-btn').addEventListener('click',function(){var n=addNote('');_activeNoteId=n.id;openEditor()});
document.querySelectorAll('.fb[data-cmd]').forEach(function(b){b.addEventListener('mousedown',function(e){e.preventDefault()});b.addEventListener('click',function(){document.execCommand(b.dataset.cmd,false,null);document.getElementById('editor').focus()})});
var _st=null;document.getElementById('editor').addEventListener('input',function(){clearTimeout(_st);_st=setTimeout(saveEditorContent,500)});
document.getElementById('editor').addEventListener('keydown',function(e){if(e.key==='Enter'){var sel=window.getSelection();var fd=this.firstElementChild;if(fd&&sel.anchorNode&&(fd.contains(sel.anchorNode)||fd===sel.anchorNode)){e.preventDefault();var nd=document.createElement('div');nd.innerHTML='<br>';fd.after(nd);var r=document.createRange();r.setStart(nd,0);r.collapse(true);sel.removeAllRanges();sel.addRange(r)}}});
document.getElementById('search').addEventListener('input',function(){var q=this.value.toLowerCase().trim();var all=getNotes();document.querySelectorAll('.note-row').forEach(function(r){var n=all.find(function(x){return x.id===r.dataset.id});r.style.display=(!q||((n?n.body:'')+getNoteTitle(n||{})).toLowerCase().indexOf(q)>=0)?'':'none'});document.querySelectorAll('.date-group').forEach(function(g){var v=false;g.querySelectorAll('.note-row').forEach(function(r){if(r.style.display!=='none')v=true});g.style.display=v?'':'none'})});
document.getElementById('more-btn').addEventListener('click',function(){var note=getNotes().find(function(n){return n.id===_activeNoteId});if(!note)return;var a=prompt((note.pinned?'Unpin':'Pin')+' or Delete?\nType "pin" or "delete":');if(!a)return;a=a.toLowerCase().trim();if(a==='pin'){var all=getNotes();var n=all.find(function(x){return x.id===_activeNoteId});if(n){n.pinned=!n.pinned;saveNotes(all)}}else if(a==='delete'){if(!confirm('Delete this note?'))return;var all=getNotes().filter(function(x){return x.id!==_activeNoteId});saveNotes(all);_activeNoteId=null;closeEditor()}});

if(!USER_ID){document.getElementById('note-list').innerHTML='<div style="text-align:center;padding:80px 20px"><svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" style="opacity:.2;margin-bottom:16px"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg><div style="font-size:20px;font-weight:600;margin-bottom:8px">Connect to Tools AI</div><div style="font-size:15px;color:#8e8e93;max-width:280px;margin:0 auto;line-height:1.5">Open Tools AI on your desktop, go to Notes, and tap the phone icon to scan your QR code.</div></div>';document.getElementById('new-note-btn').style.display='none'}
else{pullFromCloud(function(cn){var l=getNotes();if(cn){var m=mergeNotes(l,cn);localStorage.setItem('toolsai_notes_'+USER_ID,JSON.stringify(m))}renderList()});setInterval(function(){if(document.getElementById('editor-view').style.display==='flex')return;pullFromCloud(function(cn){if(cn){var l=getNotes();var m=mergeNotes(l,cn);localStorage.setItem('toolsai_notes_'+USER_ID,JSON.stringify(m));renderList()}})},15000)}
</script>
</body>
</html>
